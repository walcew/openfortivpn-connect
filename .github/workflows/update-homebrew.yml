name: Update Homebrew

on:
  release:
    types: [published]

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew tap update
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $HOMEBREW_TAP_TOKEN" \
            "https://api.github.com/repos/walcew/homebrew-tap/dispatches" \
            -d "{
              \"event_type\": \"update-cask\",
              \"client_payload\": {
                \"cask\": \"openfortivpn-connect\",
                \"version\": \"$VERSION\",
                \"repo\": \"walcew/openfortivpn-connect\",
                \"asset_pattern\": \"OpenFortiVpn.Connect_{version}_{arch}.dmg\"
              }
            }"
