<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BABF7"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- Subtle top highlight for depth -->
    <linearGradient id="highlight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom shadow for 3D effect -->
    <linearGradient id="bottomShadow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="50%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Drop shadow for shield -->
    <filter id="shieldShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Full-canvas background (macOS applies squircle mask natively) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Highlight overlay -->
  <rect width="1024" height="1024" fill="url(#highlight)"/>

  <!-- Bottom shadow -->
  <rect width="1024" height="1024" fill="url(#bottomShadow)"/>

  <!-- Shield + Padlock centered -->
  <g transform="translate(512, 475) scale(4.6)" filter="url(#shieldShadow)">
    <!-- Shield: wide flat-top, thick outline -->
    <path d="M0 -72 L-65 -50 L-65 -2 C-65 28 -35 58 0 72 C35 58 65 28 65 -2 L65 -50 Z"
          fill="none" stroke="white" stroke-width="10" stroke-linejoin="round"/>

    <!-- Padlock body -->
    <rect x="-20" y="6" width="40" height="30" rx="5" fill="white"/>

    <!-- Padlock shackle (closed) -->
    <path d="M-13 6 V-8 C-13 -22 13 -22 13 -8 V6"
          fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>

    <!-- Keyhole -->
    <circle cx="0" cy="17" r="5" fill="#2563EB"/>
    <rect x="-2" y="17" width="4" height="9" rx="1" fill="#2563EB"/>
  </g>
</svg>
